<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LowFrame Chess</title>
<style>
body { font-family: Arial; text-align: center; background: #0b0f1a; color: white; margin:0; }
h1 { margin-top:10px; }
#board { display: grid; grid-template-columns: repeat(8, 70px); width: 560px; margin: 20px auto; }
.square { width: 70px; height: 70px; display:flex; align-items:center; justify-content:center; font-size:36px; cursor:pointer; }
.white { background:#e0e0e0; color:black; }
.black { background:#3a3a3a; }
.highlight { box-shadow: inset 0 0 0 4px yellow; }
.correct { box-shadow: inset 0 0 0 4px lime; }
button { padding:10px; margin:5px; border-radius:10px; border:none; cursor:pointer; }
#overlay { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; }
#tutorial { background:#1a1a1a; padding:25px; border-radius:12px; max-width:600px; }
</style>
</head>
<body>

<h1>♟️ LowFrame Chess</h1>

<div>
<button onclick="startPieceTutorial('pawn')">Pawn</button>
<button onclick="startPieceTutorial('knight')">Knight</button>
<button onclick="startPieceTutorial('bishop')">Bishop</button>
<button onclick="startPieceTutorial('rook')">Rook</button>
<button onclick="startPieceTutorial('queen')">Queen</button>
<button onclick="startPieceTutorial('king')">King</button>
<button onclick="loadPuzzle()">🧩 Puzzle</button>
</div>

<div id="board"></div>
<div id="status"></div>

<div id="overlay">
  <div id="tutorial">
    <h2>Welcome to LowFrame Chess</h2>
    <p id="tutorialText">Click a piece above to start learning!</p>
    <button onclick="skipTutorial()">Skip</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script>
const game = new Chess();
let selected=null;
let highlights=[];
let tutorialMode=false;
let correctMove=null;

const pieceMap={p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'};

function speak(t){speechSynthesis.cancel();speechSynthesis.speak(new SpeechSynthesisUtterance(t));}

function startPieceTutorial(piece){
 tutorialMode=true;
 document.getElementById('overlay').style.display='flex';

 if(piece==='pawn'){
  game.load("8/8/8/3p4/4P3/8/8/8 w - - 0 1");
  correctMove='e4d5';
  speak("This is the pawn. It moves forward and captures diagonally. Capture the pawn.");
 }

 if(piece==='knight'){
  game.load("8/8/8/3n4/8/2N5/8/8 w - - 0 1");
  correctMove='c3d5';
  speak("This is the knight. It moves in an L shape. Capture the knight.");
 }

 if(piece==='bishop'){
  game.load("8/8/8/3b4/8/2B5/8/8 w - - 0 1");
  correctMove='c3d4';
  speak("This is the bishop. It moves diagonally. Capture the bishop.");
 }

 if(piece==='rook'){
  game.load("8/8/8/3r4/8/2R5/8/8 w - - 0 1");
  correctMove='c3d3';
  speak("This is the rook. It moves in straight lines. Capture the rook.");
 }

 if(piece==='queen'){
  game.load("8/8/8/3q4/8/2Q5/8/8 w - - 0 1");
  correctMove='c3d4';
  speak("This is the queen. It moves in all directions. Capture the queen.");
 }

 if(piece==='king'){
  game.load("8/8/8/3k4/8/2K5/8/8 w - - 0 1");
  correctMove='c3d4';
  speak("This is the king. It moves one square. Capture the king.");
 }

 drawBoard();
}

function skipTutorial(){
 document.getElementById('overlay').style.display='none';
 tutorialMode=false;
 speechSynthesis.cancel();
 resetGame();
}

function loadPuzzle(){
 tutorialMode=false;
 game.load("6k1/5ppp/8/8/8/5Q2/6PP/6K1 w - - 0 1");
 speak("Find the best move to checkmate.");
 drawBoard();
}

function resetGame(){ game.reset(); drawBoard(); }

function drawBoard(){
 const b=game.board();
 const boardDiv=document.getElementById('board');
 boardDiv.innerHTML='';

 for(let y=0;y<8;y++){
  for(let x=0;x<8;x++){
   const sq=document.createElement('div');
   sq.className='square '+((x+y)%2?'black':'white');
   const name='abcdefgh'[x]+(8-y);
   if(highlights.includes(name)) sq.classList.add('highlight');

   const p=b[y][x];
   if(p) sq.textContent=pieceMap[p.color==='w'?p.type.toUpperCase():p.type];

   sq.onclick=()=>clickSquare(x,y);
   boardDiv.appendChild(sq);
  }
 }
}

function clickSquare(x,y){
 const sq='abcdefgh'[x]+(8-y);

 if(!selected){
  selected=sq;
  highlights=game.moves({square:sq,verbose:true}).map(m=>m.to);
 } else {
  const move=game.move({from:selected,to:sq,promotion:'q'});
  selected=null; highlights=[];

  if(move){
   const played=move.from+move.to;

   if(tutorialMode && played===correctMove){
    speak("Correct! Great job.");
    document.getElementById('tutorialText').textContent="Correct!";
   } else if(tutorialMode){
    speak("Try again.");
   }

   drawBoard();
  }
 }
 drawBoard();
}

drawBoard();
</script>

</body>
</html>
