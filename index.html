<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LowFrame Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
    <style>
        :root { --bg: #312e2b; --side: #262421; --green: #81b64c; --white: #ebecd0; --black: #779556; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Arial; display: flex; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        .container { display: flex; width: 1000px; height: 660px; gap: 20px; }
        #board { display: grid; grid-template-columns: repeat(8, 80px); grid-template-rows: repeat(8, 80px); border: 4px solid #222; user-select: none; }
        .sq { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 55px; cursor: pointer; }
        .w { background: var(--white); color: var(--black); }
        .b { background: var(--black); color: var(--white); }
        .selected { background: #f6f669 !important; }
        .last { background: rgba(246, 246, 105, 0.4) !important; }
        .sidebar { width: 360px; background: var(--side); display: flex; flex-direction: column; border-radius: 5px; }
        .panel { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .status-box { background: #1b1917; padding: 15px; border-radius: 4px; margin-bottom: 15px; border-left: 5px solid var(--green); }
        .history { flex: 1; background: #21201d; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 14px; margin-bottom: 15px; border: 1px solid #333; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .main-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { background: #454341; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        button:hover { background: #555; }
        .btn-green { background: var(--green); font-size: 14px; }
        select { background: #454341; color: white; border: none; padding: 10px; border-radius: 4px; margin-bottom: 10px; width: 100%; }
        .move-row { display: grid; grid-template-columns: 35px 1fr 1fr; padding: 4px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="board"></div>
    <div class="sidebar">
        <div class="panel">
            <div class="status-box">
                <h3 id="mode-label" style="margin:0 0 5px 0;">CHESS</h3>
                <div id="instr" style="font-size:13px; color:#aaa;">Ready to play.</div>
            </div>
            <div class="history" id="history"></div>
            <label style="font-size: 11px; color: #888;">BOT STRENGTH:</label>
            <select id="difficulty">
                <option value="0">800 ELO (Beginner)</option>
                <option value="5">1500 ELO (Intermediate)</option>
                <option value="12">2200 ELO (Master)</option>
                <option value="20">3200 ELO (Grandmaster)</option>
            </select>
            <div class="controls">
                <button onclick="startTutorial('pawn')">Pawn</button>
                <button onclick="startTutorial('knight')">Knight</button>
                <button onclick="startTutorial('bishop')">Bishop</button>
                <button onclick="startTutorial('rook')">Rook</button>
                <button onclick="startTutorial('queen')">Queen</button>
                <button onclick="startTutorial('king')">King</button>
            </div>
            <div class="main-controls">
                <button class="btn-green" onclick="startMode('ai')">PLAY BOT</button>
                <button class="btn-green" onclick="startMode('human')">2 PLAYER</button>
                <button style="grid-column: span 2;" onclick="reset()">RESET / SKIP</button>
            </div>
        </div>
    </div>
</div>

<script>
    // PASTE YOUR FULL STOCKFISH CODE BETWEEN THESE BACKTICKS
    const stockfishCode = ` `; 

    const game = new Chess();
    const boardEl = document.getElementById('board');
    const histEl = document.getElementById('history');
    const instrEl = document.getElementById('instr');
    let selected = null, engine = null, mode = 'human', tutorialTarget = null;
    const pieces = { p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚', P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔' };

    function initEngine() {
        if (engine || !stockfishCode.trim()) return;
        try {
            const blob = new Blob([stockfishCode], { type: 'application/javascript' });
            engine = new Worker(URL.createObjectURL(blob));
            engine.onmessage = (e) => {
                const line = e.data;
                if (line.includes('bestmove')) {
                    const moveStr = line.split('bestmove ')[1].split(' ')[0];
                    game.move({ from: moveStr.slice(0,2), to: moveStr.slice(2,4), promotion: 'q' });
                    render();
                }
            };
            engine.postMessage('uci');
            engine.postMessage('isready');
        } catch (e) { instrEl.innerText = "Engine Error."; }
    }

    function render() {
        boardEl.innerHTML = '';
        const history = game.history({verbose: true});
        const last = history[history.length - 1];
        for (let i = 0; i < 64; i++) {
            const r = Math.floor(i / 8), c = i % 8;
            const sq = String.fromCharCode(97 + c) + (8 - r);
            const el = document.createElement('div');
            el.className = `sq ${(r + c) % 2 === 0 ? 'w' : 'b'}`;
            if (selected === sq) el.classList.add('selected');
            if (last && (last.from === sq || last.to === sq)) el.classList.add('last');
            const p = game.get(sq);
            if (p) el.innerText = pieces[p.color === 'w' ? p.type.toUpperCase() : p.type];
            el.onclick = () => handleClick(sq);
            boardEl.appendChild(el);
        }
        updateHistory();
    }

    function handleClick(sq) {
        const p = game.get(sq);
        if (selected === null) {
            if (p && p.color === game.turn()) { selected = sq; render(); }
        } else {
            const move = game.move({ from: selected, to: sq, promotion: 'q' });
            if (move) {
                if (tutorialTarget === (selected + sq)) {
                    instrEl.innerText = "Tutorial Complete!";
                    tutorialTarget = null;
                }
                selected = null;
                render();
                if (mode === 'ai' && !game.game_over()) {
                    instrEl.innerText = "Bot is thinking...";
                    const level = document.getElementById('difficulty').value;
                    engine.postMessage(`setoption name Skill Level value ${level}`);
                    engine.postMessage(`position fen ${game.fen()}`);
                    engine.postMessage(`go movetime 1000`);
                }
            } else {
                selected = (p && p.color === game.turn()) ? sq : null;
                render();
            }
        }
    }

    function updateHistory() {
        const h = game.history(); histEl.innerHTML = '';
        for (let i = 0; i < h.length; i += 2) {
            histEl.innerHTML += `<div class="move-row"><span>${(i/2)+1}.</span><b>${h[i]}</b><span>${h[i+1]||''}</span></div>`;
        }
        histEl.scrollTop = histEl.scrollHeight;
    }

    function startMode(m) {
        mode = m; game.reset(); tutorialTarget = null;
        document.getElementById('mode-label').innerText = m === 'ai' ? "VS BOT" : "2 PLAYER";
        instrEl.innerText = m === 'ai' ? "White to move." : "Local multiplayer.";
        if (m === 'ai') initEngine();
        render();
    }

    function startTutorial(type) {
        mode = 'human'; game.reset(); tutorialTarget = null;
        document.getElementById('mode-label').innerText = "LEARN: " + type.toUpperCase();
        if (type === 'pawn') { game.load("8/8/8/3p4/4P3/8/8/8 w - - 0 1"); tutorialTarget = "e4d5"; instrEl.innerText = "Pawns capture diagonally."; }
        if (type === 'knight') { game.load("8/8/8/3n4/8/2N5/8/8 w - - 0 1"); tutorialTarget = "c3d5"; instrEl.innerText = "Knights move in an L-shape."; }
        if (type === 'bishop') { game.load("8/8/8/3p4/8/5B2/8/8 w - - 0 1"); tutorialTarget = "f3d5"; instrEl.innerText = "Bishops move diagonally."; }
        if (type === 'rook') { game.load("8/8/3r4/8/8/3R4/8/8 w - - 0 1"); tutorialTarget = "d3d6"; instrEl.innerText = "Rooks move in straight lines."; }
        if (type === 'queen') { game.load("8/8/8/3p4/8/8/8/Q7 w - - 0 1"); tutorialTarget = "a1d4"; instrEl.innerText = "Queens move any distance."; }
        if (type === 'king') { game.load("8/8/8/8/4p3/3K4/8/8 w - - 0 1"); tutorialTarget = "d3e4"; instrEl.innerText = "Kings move one square."; }
        render();
    }

    function reset() { startMode('human'); }
    render();
</script>
</body>
</html>
