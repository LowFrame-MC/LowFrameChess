<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LowFrame chess</title>
    <script src="chess.min.js"></script>
    <style>
        :root { --bg: #312e2b; --side: #262421; --green: #81b64c; --white: #ebecd0; --black: #779556; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        .container { display: flex; width: 950px; height: 620px; gap: 20px; }
        
        #board { display: grid; grid-template-columns: repeat(8, 70px); grid-template-rows: repeat(8, 70px); border: 5px solid #222; background: #222; }
        .sq { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 45px; cursor: pointer; }
        .w { background: var(--white); color: #444; }
        .b { background: var(--black); color: #fff; }
        .selected { background: #f6f669 !important; }
        .last-move { background: rgba(246, 246, 105, 0.4) !important; }

        .sidebar { width: 330px; background: var(--side); padding: 20px; display: flex; flex-direction: column; border-radius: 4px; box-sizing: border-box; }
        .status { background: #1b1917; padding: 15px; border-left: 5px solid var(--green); margin-bottom: 15px; }
        .history { flex: 1; background: #1b1917; margin-bottom: 15px; padding: 10px; font-size: 13px; overflow-y: auto; font-family: monospace; border: 1px solid #333; }
        
        button { background: #454341; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        button:hover { background: #555; }
        .btn-green { background: var(--green); height: 50px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="board"></div>
    <div class="sidebar">
        <div class="status">
            <h3 id="mode-label" style="margin:0;">CHESS</h3>
            <div id="instr" style="font-size:12px; color:#aaa; margin-top:5px;">Ready to play.</div>
        </div>
        <div class="history" id="history"></div>
        <button class="btn-green" onclick="startBot()">Play vs Bot</button>
        <button class="btn-green" onclick="startHuman()">2 Player</button>
        <button style="margin-top:auto; background: #444;" onclick="location.reload()">Reset Board</button>
    </div>
</div>

<script>
    let game, engine, mode = 'human', selectedSq = null;
    const pieces = { p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚', P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔' };

    window.onload = () => {
        if (typeof Chess === 'undefined') {
            document.getElementById('instr').innerText = "ERROR: chess.min.js not found!";
            return;
        }
        game = new Chess();
        render();
    };

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        const history = game.history();
        const lastMove = history.length > 0 ? game.history({verbose: true}).pop() : null;

        for (let i = 0; i < 64; i++) {
            const r = Math.floor(i / 8), c = i % 8;
            const sq = String.fromCharCode(97 + c) + (8 - r);
            const el = document.createElement('div');
            el.className = `sq ${(r + c) % 2 === 0 ? 'w' : 'b'}`;
            
            if (selectedSq === sq) el.classList.add('selected');
            if (lastMove && (lastMove.from === sq || lastMove.to === sq)) el.classList.add('last-move');

            const p = game.get(sq);
            if (p) el.innerText = pieces[p.color === 'w' ? p.type.toUpperCase() : p.type];
            
            el.onclick = () => handleClick(sq);
            boardEl.appendChild(el);
        }
        
        const histEl = document.getElementById('history');
        histEl.innerText = history.join(' ');
        histEl.scrollTop = histEl.scrollHeight;
    }

    function handleClick(sq) {
        const p = game.get(sq);
        if (selectedSq === null) {
            if (p && p.color === game.turn()) {
                selectedSq = sq;
                render();
            }
        } else {
            const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
            selectedSq = null;
            render();

            if (move && mode === 'ai' && !game.game_over()) {
                document.getElementById('instr').innerText = "Bot is thinking...";
                engine.postMessage(`position fen ${game.fen()}`);
                engine.postMessage(`go movetime 1000`);
            }
        }
    }

    function startBot() {
        mode = 'ai';
        document.getElementById('mode-label').innerText = "VS BOT";
        game.reset();
        if (!engine) {
            engine = new Worker('stockfish.js');
            engine.onmessage = (e) => {
                if (e.data.includes('bestmove')) {
                    const m = e.data.split('bestmove ')[1].split(' ')[0];
                    game.move({ from: m.slice(0,2), to: m.slice(2,4), promotion: 'q' });
                    document.getElementById('instr').innerText = "Your turn.";
                    render();
                }
            };
            engine.postMessage('uci');
        }
        render();
    }

    function startHuman() {
        mode = 'human';
        document.getElementById('mode-label').innerText = "2 PLAYER";
        game.reset();
        render();
    }
</script>
</body>
</html>
